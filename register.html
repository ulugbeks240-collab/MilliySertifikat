<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat - Ro'yxatdan o'tish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/80 border border-slate-100 max-w-md w-full">
        <div class="flex flex-col items-center mb-8">
            <div class="bg-blue-600 text-white p-3 rounded-2xl shadow-lg shadow-blue-200 mb-3">
                <i class="fas fa-user-plus text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-900">Ro'yxatdan o'tish</h2>
            <p class="text-slate-400 text-sm mt-1">Platformadan foydalanish uchun hisob yarating</p>
        </div>

        <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-xl mb-4 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText">Bu login allaqachon band!</span>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Ism va Familiya</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" id="fullNameInput" required placeholder="Ismingizni kiriting" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-sm bg-slate-50/50">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Login (Username)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fas fa-at"></i>
                    </span>
                    <input type="text" id="usernameInput" required placeholder="shonazarov23" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-sm bg-slate-50/50">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Parol</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="passwordInput" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-sm bg-slate-50/50">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm py-3 rounded-xl shadow-md active:scale-[0.98] mt-2">
                Ro'yxatdan o'tish
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-500 border-t border-slate-100 pt-4">
            Akkauntingiz bormi? <a href="login.html" class="text-blue-600 hover:underline font-semibold ml-1">Tizimga kirish</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullNameInput').value.trim();
            const username = document.getElementById('usernameInput').value.trim().toLowerCase();
            const password = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');

            // 1. LocalStorage ichidan eski ro'yxatni o'qiymiz
            let usersList = JSON.parse(localStorage.getItem('usersList')) || [];

            // 2. TEKSHIRUV: Kiritilgan login bazada bormi?
            const isExist = usersList.some(user => user.username === username);

            if (isExist) {
                // Agar login band bo'lsa, pastdagi ogohlantirishni chiqaramiz va to'xtatamiz
                errorText.innerText = "❌ Ushbu @" + username + " logini band! Boshqa login tanlang.";
                errorMsg.classList.remove('hidden');
                return; 
            }

            // 3. Agar hamma narsa to'g'ri bo'lsa, yangi foydalanuvchini massivga qo'shamiz
            const newUser = {
                name: fullName,
                username: username,
                password: password,
                status: 'Oddiy'
            };

            usersList.push(newUser);

            // 4. Ro'yxatni yangilab bazaga saqlaymiz
            localStorage.setItem('usersList', JSON.stringify(usersList));

            // Eski login/sozlamalar sahifalariga ziyon yetmasligi uchun quyidagi elementlarni ham yangilab qo'yamiz
            localStorage.setItem('userName', fullName);
            localStorage.setItem('savedUsername', username);
            localStorage.setItem('savedPassword', password);

            errorMsg.classList.add('hidden');
            alert("🎉 Ro'yxatdan muvaffaqiyatli o'tdingiz!");
            window.location.href = 'login.html'; 
        });
        if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = 'login.html';
    }
    </script>
</body>
</html>
