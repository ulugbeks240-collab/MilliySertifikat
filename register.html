<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat - Ro'yxatdan o'tish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/80 border border-slate-100 max-w-md w-full">
        <div class="flex flex-col items-center mb-6">
            <div class="bg-blue-600 text-white p-3 rounded-2xl shadow-lg shadow-blue-200 mb-3">
                <i class="fas fa-user-plus text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-900">Ro'yxatdan o'tish</h2>
            <p class="text-slate-400 text-sm mt-1">Firebase orqali global hisob yaratish</p>
        </div>

        <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-xl mb-4 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-600 text-sm p-3 rounded-xl mb-4 flex items-center gap-2">
            <i class="fas fa-check-circle"></i>
            <span>Muvaffaqiyatli ro'yxatdan o'tdingiz! Kirish sahifasiga o'tilyapti...</span>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Ism va Familiya</label>
                <input type="text" id="nameInput" required placeholder="Ismingizni kiriting"
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-sm bg-slate-50/50">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Login (Email formatida)</label>
                <input type="email" id="emailInput" required placeholder="example@test.com"
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-sm bg-slate-50/50">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Parol (kamida 6 ta belgi)</label>
                <input type="password" id="passwordInput" required placeholder="••••••••"
                    class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-sm bg-slate-50/50">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm py-3 rounded-xl shadow-md active:scale-[0.98] mt-2">
                Ro'yxatdan o'tish
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-500 border-t border-slate-100 pt-4">
            Akkauntingiz bormi? <a href="login.html" class="text-blue-600 hover:underline font-semibold ml-1">Kirish</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase konfiguratsiyangiz
        const firebaseConfig = {
            apiKey: "AIzaSyBFP_eL50eMwCZ84IL9IuMJ3Slj_atkuBc",
            authDomain: "milliy-sertifikat-bbaf2.firebaseapp.com",
            projectId: "milliy-sertifikat-bbaf2",
            storageBucket: "milliy-sertifikat-bbaf2.firebasestorage.app",
            messagingSenderId: "426979442492",
            appId: "1:426979442492:web:29c01be433376c4bd12839",
            measurementId: "G-MZ847LGW6C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const registerForm = document.getElementById('registerForm');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');

        registerForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            
            const fullName = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim().toLowerCase();
            const password = document.getElementById('passwordInput').value.trim();

            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            try {
                // 1. Firebase Auth orqali global foydalanuvchi ochish
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. O'quvchi ma'lumotlarini Firestore bazasiga saqlash
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: fullName,
                    email: email,
                    status: "Oddiy", // Boshlanishiga hamma oddiy foydalanuvchi
                    createdAt: new Date().toISOString()
                });

                // 3. Statistikada global odamlar sonini 1 taga oshirish
                await setDoc(doc(db, "statistika", "umumiy"), {
                    odamlarSoni: increment(1)
                }, { merge: true });

                // Muvaffaqiyatli xabar
                successMsg.classList.remove('hidden');
                registerForm.reset();

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                console.error(error);
                if (error.code === 'auth/email-already-in-use') {
                    errorText.innerText = "Bu login (email) allaqachon ro'yxatdan o'tgan!";
                } else if (error.code === 'auth/weak-password') {
                    errorText.innerText = "Parol juda oddiy! Kamida 6 ta belgi bo'lsin.";
                } else {
                    errorText.innerText = "Xatolik yuz berdi: " + error.message;
                }
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
