<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertifikat - Kirish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/80 border border-slate-100 max-w-md w-full">
        <div class="flex flex-col items-center mb-8">
            <div class="bg-blue-600 text-white p-3 rounded-2xl shadow-lg shadow-blue-200 mb-3">
                <i class="fas fa-book-open text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-900">Platformaga kirish</h2>
            <p class="text-slate-400 text-sm mt-1">Davom etish uchun login va parolingizni kiriting</p>
        </div>

        <div id="errorMsg"
            class="hidden bg-red-50 border border-red-200 text-red-600 text-sm p-3 rounded-xl mb-4 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Login (Email)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fas fa-at"></i>
                    </span>
                    <input type="text" id="loginInput" required placeholder="example@test.com"
                        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-sm bg-slate-50/50">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Parol</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="passwordInput" required placeholder="••••••••"
                        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-sm bg-slate-50/50">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm py-3 rounded-xl shadow-md shadow-blue-100 active:scale-[0.98] mt-2">
                Tizimga kirish
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-500 border-t border-slate-100 pt-4 flex flex-col gap-2">
            <div>
                A'zo emassizmi? <a href="register.html"
                    class="text-blue-600 hover:underline font-semibold ml-1">Ro'yxatdan o'tish</a>
            </div>
            <div class="mt-2 text-xs">
                Sayt boshqaruvchisimisiz? <a href="admin.html" class="text-red-600 hover:underline font-medium ml-1"><i
                        class="fas fa-user-shield"></i> Admin Panel</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Siz yaratgan Firebase Loyihasining shaxsiy sozlamalari
        const firebaseConfig = {
            apiKey: "AIzaSyBFP_eL50eMwCZ84IL9IuMJ3Slj_atkuBc",
            authDomain: "milliy-sertifikat-bbaf2.firebaseapp.com",
            projectId: "milliy-sertifikat-bbaf2",
            storageBucket: "milliy-sertifikat-bbaf2.firebasestorage.app",
            messagingSenderId: "426979442492",
            appId: "1:426979442492:web:29c01be433376c4bd12839",
            measurementId: "G-MZ847LGW6C"
        };

        // Firebase-ni ishga tushiramiz
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        // Agar foydalanuvchi allaqachon tizimga kirgan bo'lsa, avtomatik sozlamalar sahifasiga o'tkazadi
        onAuthStateChanged(auth, (user) => {
            if (user) {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'sozlamlar.html';
            }
        });

        // Form yuborilganda Firebase orqali tekshirish
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const inputUsername = document.getElementById('loginInput').value.trim().toLowerCase();
            const inputPassword = document.getElementById('passwordInput').value.trim();

            // 1. ADMIN KIRISH TEKSHIRUVI (Static qoldi)
            if (inputUsername === "admin23" && inputPassword === "admin23") {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'admin.html';
                return;
            }

            // 2. FOYDALANUVCHINI FIREBASE GLOBAL SERVERIDAN TEKSHIRISH
            try {
                // Firebase orqali kirish
                const userCredential = await signInWithEmailAndPassword(auth, inputUsername, inputPassword);
                const user = userCredential.user;

                // Eski local tizimingiz ham ishlashi uchun ma'lumotlarni saqlaymiz
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userName', user.email.split('@')[0]); // Vaqtincha email bosh qismi ism qilib olindi
                localStorage.setItem('savedUsername', user.email);

                errorMsg.classList.add('hidden');
                window.location.href = 'sozlamlar.html';
            } catch (error) {
                console.error("Firebase Auth Error:", error);
                
                // Xatolik xabarini chiqarish
                errorText.innerText = "Login (Email) yoki parol noto'g'ri, yoxud bunday foydalanuvchi mavjud emas!";
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
