<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sozlamalar - Sertifikat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F8FAFC; font-family: 'Inter', sans-serif; }
        .sidebar-item:hover { background-color: #f1f5f9; }
        .sidebar-active8 { background-color: #2563eb; color: white !important; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div class="flex min-h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <i class="fas fa-book-open"></i>
                </div>
                <div>
                    <h1 class="font-bold text-gray-800 leading-none">Sertifikat</h1>
                    <p class="text-xs text-gray-500">Ta'lim platformasi</p>
                </div>
            </div>
    
            <nav class="flex-1 px-4 space-y-1">
                <a href="index.html" class="sidebar-active1 flex items-center gap-3 p-3 rounded-lg shadow-md shadow-blue-200">
                    <i class="fas fa-home w-5"></i> Bosh sahifa
                </a>
                <a href="test.html" class="sidebar-active2 flex items-center gap-3 p-3 rounded-lg shadow-md shadow-blue-200">
                    <i class="fas fa-file-alt w-5"></i> Testlar
                </a>
                <a href="video.html" class="sidebar-active3 flex items-center gap-3 p-3 rounded-lg shadow-md shadow-blue-200">
                    <i class="fas fa-play-circle w-5"></i> Video darslar
                </a>
                <a href="mock.html" class="sidebar-active4 flex items-center gap-3 p-3 rounded-lg shadow-md shadow-blue-200">
                    <i class="fas fa-edit w-5"></i> Mock imtihon
                </a>
                <a href="kalendar.html" class="sidebar-active flex items-center gap-3 p-3 rounded-lg shadow-md shadow-blue-200">
                    <i class="fas fa-calendar-alt w-5"></i> Kalendar
                </a>
                <a href="statistika.html" class="sidebar-active5 flex items-center gap-3 p-3 rounded-lg shadow-md shadow-blue-200">
                    <i class="fas fa-chart-bar w-5"></i> Statistika
                </a>
                <a href="reyting.html" class="sidebar-active6 flex items-center gap-3 p-3 rounded-lg shadow-md shadow-blue-200">
                    <i class="fas fa-trophy w-5"></i> Reyting
                </a>
                <a href="profil.html" class="sidebar-active7 flex items-center gap-3 p-3 rounded-lg shadow-md shadow-blue-200">
                    <i class="fas fa-user w-5"></i> Profil
                </a>
                <a href="sozlamlar.html" class="sidebar-active8 flex items-center gap-3 p-3 rounded-lg shadow-md shadow-blue-200">
                    <i class="fas fa-cog w-5"></i> Sozlamalar
                </a>
            </nav>
    
            <div class="p-4 border-t border-gray-100">
                <div class="flex items-center justify-between p-3 text-gray-600 cursor-pointer">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-bell"></i> Bildirishnomalar
                    </div>
                    <span class="bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-full">3</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 p-10">
            <header class="mb-10">
                <h1 class="text-2xl font-bold text-gray-800">Sozlamalar</h1>
                <p class="text-gray-400">Platforma sozlamalari</p>
            </header>

            <div class="max-w-3xl bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
                <h2 class="text-lg font-bold text-gray-800 mb-6">Bildirishnomalar</h2>
                
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <label for="email_notif" class="text-gray-600 font-medium cursor-pointer">Email bildirishnomalar</label>
                        <input type="checkbox" id="email_notif" checked class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                    </div>

                    <div class="flex items-center justify-between">
                        <label for="push_notif" class="text-gray-600 font-medium cursor-pointer">Push bildirishnomalar</label>
                        <input type="checkbox" id="push_notif" checked class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                    </div>

                    <div class="flex items-center justify-between">
                        <label for="new_lessons" class="text-gray-600 font-medium cursor-pointer">Yangi darslar haqida</label>
                        <input type="checkbox" id="new_lessons" checked class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                    </div>

                    <div class="flex items-center justify-between">
                        <label for="test_reminders" class="text-gray-600 font-medium cursor-pointer">Testlar eslatmasi</label>
                        <input type="checkbox" id="test_reminders" checked class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
